github_analytics:
  target: "{{ env_var('DBT_TARGET', 'dev') }}"
  outputs:

    # ── Local dev: DuckDB (no GCP credentials needed) ──────────────────────────
    dev:
      type: duckdb
      path: "{{ env_var('DBT_DUCKDB_PATH', 'dev.duckdb') }}"
      schema: main
      threads: 4

    # ── Production: Snowflake ──────────────────────────────────────────────────
    prod:
      type: snowflake
      account:   "{{ env_var('SNOWFLAKE_ACCOUNT') }}"        # e.g. xyz12345.us-east-1
      user:      "{{ env_var('SNOWFLAKE_USER') }}"
      password:  "{{ env_var('SNOWFLAKE_PASSWORD') }}"
      role:      "{{ env_var('SNOWFLAKE_ROLE', 'ACCOUNTADMIN') }}"
      warehouse: "{{ env_var('SNOWFLAKE_WAREHOUSE', 'COMPUTE_WH') }}"
      database:  "{{ env_var('SNOWFLAKE_DATABASE', 'GITHUB_PIPELINE') }}"
      schema:    "{{ env_var('SNOWFLAKE_SCHEMA_MART', 'MART') }}"
      threads: 4
      client_session_keep_alive: false
